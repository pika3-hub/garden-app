{# 関連タスクカード（詳細画面サイドバー用） #}
{% if related_tasks %}
<div class="card mb-3">
    <div class="card-header bg-warning text-dark">
        <h6 class="mb-0"><img src="{{ url_for('static', filename='images/icon_tasklist.png') }}" alt="" class="icon-img"> 未完了タスク</h6>
    </div>
    <div class="card-body">
        <ul class="list-group list-group-flush">
            {% for task in related_tasks %}
            <li class="list-group-item">
                <a href="{{ url_for('tasks.detail', task_id=task.id) }}">
                    <i class="bi bi-check2-square"></i> {{ task.title }}
                </a>
                <div class="text-muted small">
                    {% if task.status == 'in_progress' %}
                    <span class="badge bg-primary">進行中</span>
                    {% else %}
                    <span class="badge bg-secondary">未着手</span>
                    {% endif %}
                    {% if task.due_date %}
                    <span class="ms-1">期限: {{ task.due_date }}</span>
                    {% endif %}
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endif %}
